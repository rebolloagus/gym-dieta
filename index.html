<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2E7D46">
<title>Gym y Dieta — Agustín</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
/* ============ tokens ============ */
:root{
  --bg:#F2F4EF; --card:#FFFFFF; --ink:#20261F; --ink2:#596355; --mut:#8B937F;
  --line:#E2E6DB; --line2:#CFD6C6;
  --green:#2E7D46; --green-ink:#256B3B; --green-soft:#E5F1E8; --green-line:#BFDCC8;
  --navy:#2C4468; --navy-ink:#2C4468; --navy-soft:#E8EEF6; --navy-line:#C4D2E6;
  --amber-ink:#8F5B06; --amber-soft:#F7EDDA; --amber-line:#E3CD9E;
  --red-ink:#A33C2B; --red-soft:#F8E7E2; --red-line:#E6C0B6;
  --chart-green:#2E7D46; --chart-blue:#3468B0;
  --shadow:0 1px 2px rgba(32,38,31,.05),0 4px 14px rgba(32,38,31,.05);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#141813; --card:#1C221C; --ink:#E7ECE3; --ink2:#A8B2A1; --mut:#7C8677;
    --line:#2B322A; --line2:#3A4238;
    --green:#5CB57E; --green-ink:#7FC79A; --green-soft:#1F3126; --green-line:#33543F;
    --navy:#8FB0DC; --navy-ink:#9CB9E2; --navy-soft:#1E2836; --navy-line:#32496C;
    --amber-ink:#DCA75E; --amber-soft:#322A17; --amber-line:#57451F;
    --red-ink:#E28D79; --red-soft:#33201B; --red-line:#5C3328;
    --chart-green:#3E9C63; --chart-blue:#4D86D8;
    --shadow:0 1px 2px rgba(0,0,0,.35);
  }
}
:root[data-theme="light"]{
  --bg:#F2F4EF; --card:#FFFFFF; --ink:#20261F; --ink2:#596355; --mut:#8B937F;
  --line:#E2E6DB; --line2:#CFD6C6;
  --green:#2E7D46; --green-ink:#256B3B; --green-soft:#E5F1E8; --green-line:#BFDCC8;
  --navy:#2C4468; --navy-ink:#2C4468; --navy-soft:#E8EEF6; --navy-line:#C4D2E6;
  --amber-ink:#8F5B06; --amber-soft:#F7EDDA; --amber-line:#E3CD9E;
  --red-ink:#A33C2B; --red-soft:#F8E7E2; --red-line:#E6C0B6;
  --chart-green:#2E7D46; --chart-blue:#3468B0;
  --shadow:0 1px 2px rgba(32,38,31,.05),0 4px 14px rgba(32,38,31,.05);
}
:root[data-theme="dark"]{
  --bg:#141813; --card:#1C221C; --ink:#E7ECE3; --ink2:#A8B2A1; --mut:#7C8677;
  --line:#2B322A; --line2:#3A4238;
  --green:#5CB57E; --green-ink:#7FC79A; --green-soft:#1F3126; --green-line:#33543F;
  --navy:#8FB0DC; --navy-ink:#9CB9E2; --navy-soft:#1E2836; --navy-line:#32496C;
  --amber-ink:#DCA75E; --amber-soft:#322A17; --amber-line:#57451F;
  --red-ink:#E28D79; --red-soft:#33201B; --red-line:#5C3328;
  --chart-green:#3E9C63; --chart-blue:#4D86D8;
  --shadow:0 1px 2px rgba(0,0,0,.35);
}

/* ============ base ============ */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font:15px/1.5 -apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  -webkit-text-size-adjust:100%;
}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer}
:focus-visible{outline:2px solid var(--navy);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion: reduce){ *{transition:none!important;animation:none!important} }

.app{max-width:560px;margin:0 auto;padding:0 14px calc(92px + env(safe-area-inset-bottom));}

/* ============ header ============ */
header.top{
  display:flex;align-items:center;gap:10px;
  padding:14px 2px 10px;
  position:sticky;top:0;z-index:20;background:var(--bg);
}
.brand{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--mut);flex:1;white-space:nowrap}
.brand b{color:var(--green-ink)} .brand i{font-style:normal;color:var(--navy-ink)}
.savechip{display:block;font-size:10.5px;font-weight:600;letter-spacing:0;text-transform:none;color:var(--green-ink);opacity:0;transition:opacity .25s}
.savechip.show{opacity:1}
.btn.wide{display:block;width:100%;padding:12px;margin:12px 0 4px;font-size:15px;text-align:center}
.daynav{display:flex;align-items:center;gap:2px}
.daynav button.arr{
  width:36px;height:36px;border:1px solid var(--line);border-radius:10px;
  background:var(--card);color:var(--ink2);font-size:18px;line-height:1;
}
.daylabel{text-align:center;min-width:118px}
.daylabel .dw{font-weight:700;font-size:15px}
.daylabel .dt{font-size:12px;color:var(--ink2);font-variant-numeric:tabular-nums}
.chip-today{
  border:1px solid var(--navy-line);background:var(--navy-soft);color:var(--navy-ink);
  border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;
}
.chip-today[hidden]{display:none}

/* ============ cards ============ */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:14px 14px 12px;margin:10px 0;box-shadow:var(--shadow);
}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);margin-bottom:2px}
.eyebrow.g{color:var(--green-ink)} .eyebrow.b{color:var(--navy-ink)}
.hint{font-size:13px;color:var(--ink2);margin:8px 0 0}
.hint b{color:var(--ink)}

/* resumen del día */
.sumrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.sumbig{font-size:19px;font-weight:700;letter-spacing:-.01em}
.dots{display:flex;gap:6px}
.dot{width:11px;height:11px;border-radius:50%;background:transparent;border:1.5px solid var(--line2)}
.dot.todo{background:var(--green);border-color:var(--green)}
.dot.parte{background:var(--amber-ink);border-color:var(--amber-ink)}
.dot.no{background:var(--red-ink);border-color:var(--red-ink)}

/* ============ comidas ============ */
.mhead{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.time{
  font-size:12px;font-weight:700;color:var(--green-ink);background:var(--green-soft);
  border:1px solid var(--green-line);border-radius:6px;padding:1px 7px;
  font-variant-numeric:tabular-nums;
}
.mname{font-weight:700;font-size:16px}
.optTag{font-size:11px;color:var(--mut);border:1px solid var(--line2);border-radius:999px;padding:1px 8px}
.mdesc{margin:6px 0 10px;font-size:14px;color:var(--ink2)}
.seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.sbtn{
  border:1px solid var(--line);background:transparent;border-radius:10px;
  padding:9px 4px;font-size:14px;font-weight:600;color:var(--ink2);
  transition:background .12s,border-color .12s,color .12s;
}
.sbtn.todo.on{background:var(--green-soft);border-color:var(--green-line);color:var(--green-ink)}
.sbtn.parte.on{background:var(--amber-soft);border-color:var(--amber-line);color:var(--amber-ink)}
.sbtn.no.on{background:var(--red-soft);border-color:var(--red-line);color:var(--red-ink)}
input.note{
  width:100%;margin-top:9px;border:none;border-bottom:1px dashed var(--line2);
  background:transparent;padding:5px 2px;font-size:13.5px;color:var(--ink);
}
input.note::placeholder{color:var(--mut)}
input.note:focus{outline:none;border-bottom-color:var(--green)}

/* ============ gym ============ */
.seg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px}
.dbtn{
  border:1px solid var(--line);background:transparent;border-radius:10px;
  padding:9px 4px;font-size:13.5px;font-weight:600;color:var(--ink2);line-height:1.25;
}
.dbtn small{display:block;font-weight:500;font-size:11px;color:var(--mut)}
.dbtn.on{background:var(--navy-soft);border-color:var(--navy-line);color:var(--navy-ink)}
.dbtn.on small{color:var(--navy-ink);opacity:.75}
.exnum{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:7px;flex:none;
  background:var(--navy-soft);border:1px solid var(--navy-line);
  color:var(--navy-ink);font-size:12px;font-weight:700;
}
.exhead{display:flex;align-items:center;gap:9px}
.exname{font-weight:700;font-size:15.5px;line-height:1.3}
.exmeta{font-size:12.5px;color:var(--ink2);margin:5px 0 2px;font-variant-numeric:tabular-nums}
.exmeta b{color:var(--navy-ink)}
.excue{font-size:12.5px;color:var(--mut);margin:0 0 9px}
.lastrow{
  font-size:12.5px;color:var(--ink2);background:var(--bg);
  border:1px dashed var(--line2);border-radius:8px;padding:5px 9px;margin:0 0 9px;
  font-variant-numeric:tabular-nums;
}
.lastrow b{color:var(--ink)}
.setrow{display:grid;grid-template-columns:36px 1fr 1fr;gap:8px;align-items:center;margin-top:6px}
.setn{font-size:12px;font-weight:700;color:var(--mut);font-variant-numeric:tabular-nums}
.setrow input{
  width:100%;border:1px solid var(--line);border-radius:9px;background:transparent;
  padding:8px 10px;font-size:15px;font-variant-numeric:tabular-nums;
}
.setrow input:focus{outline:none;border-color:var(--navy)}
.setrow input.hit{background:var(--green-soft);border-color:var(--green-line);color:var(--green-ink);font-weight:700}
.topb{
  display:none;margin-top:9px;font-size:12.5px;font-weight:600;
  background:var(--green-soft);border:1px solid var(--green-line);color:var(--green-ink);
  border-radius:8px;padding:6px 9px;
}
.topb.show{display:block}
.warn{
  background:var(--amber-soft);border:1px solid var(--amber-line);color:var(--amber-ink);
  border-radius:10px;padding:8px 11px;font-size:12.5px;margin:10px 0 0;
}
.checkrow{display:flex;align-items:flex-start;gap:10px;padding:4px 0}
.checkrow input[type=checkbox]{width:20px;height:20px;margin:2px 0 0;accent-color:var(--green);flex:none}
.checkrow .ct{display:block;font-weight:700;font-size:14.5px}
.checkrow .cd{font-size:13px;color:var(--ink2)}
.ckhead{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.ckhead .ct{font-weight:700;font-size:14.5px}
.ckhead .cnt{
  font-size:12px;font-weight:700;color:var(--green-ink);background:var(--green-soft);
  border:1px solid var(--green-line);border-radius:999px;padding:1px 10px;
  font-variant-numeric:tabular-nums;white-space:nowrap;flex:none;
}
.cd{font-size:13px;color:var(--ink2)}
.cd b{color:var(--ink)}
.ckitem{
  display:flex;gap:10px;align-items:flex-start;padding:8px 0;margin-top:2px;
  border-top:1px solid var(--line);font-size:13px;color:var(--ink2);cursor:pointer;
}
.ckitem input[type=checkbox]{width:19px;height:19px;margin:0;accent-color:var(--green);flex:none}
.ckitem b{color:var(--ink)}

/* ============ progreso ============ */
.kpis{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 2px}
.kpi{
  background:var(--bg);border:1px solid var(--line);border-radius:10px;
  padding:6px 11px;font-size:12.5px;color:var(--ink2);font-variant-numeric:tabular-nums;
}
.kpi b{display:block;font-size:16.5px;color:var(--ink);letter-spacing:-.01em}
.kpi.good b{color:var(--green-ink)}
.wform{display:flex;gap:8px;margin-top:10px}
.wform input{
  flex:1;border:1px solid var(--line);border-radius:10px;background:transparent;
  padding:9px 12px;font-size:16px;font-variant-numeric:tabular-nums;
}
.wform input:focus{outline:none;border-color:var(--green)}
.btn{
  border:1px solid var(--green-line);background:var(--green-soft);color:var(--green-ink);
  border-radius:10px;padding:9px 16px;font-weight:700;font-size:14px;
}
.btn.b{border-color:var(--navy-line);background:var(--navy-soft);color:var(--navy-ink)}
.btn.plain{border-color:var(--line);background:transparent;color:var(--ink2)}
.btn.danger{border-color:var(--red-line);background:transparent;color:var(--red-ink)}
.chartbox{margin-top:10px}
.chartbox svg{width:100%;height:auto;display:block}
.cdetail{font-size:12.5px;color:var(--ink2);min-height:18px;margin-top:4px;font-variant-numeric:tabular-nums}
.wlist{margin-top:8px}
.wli{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 2px;border-top:1px solid var(--line);
  font-size:13.5px;font-variant-numeric:tabular-nums;color:var(--ink2);
}
.wli b{color:var(--ink)}
.wli button{border:none;background:none;color:var(--mut);font-size:15px;padding:2px 8px}
select.exsel{
  width:100%;margin-top:8px;border:1px solid var(--line);border-radius:10px;
  background:var(--card);padding:9px 10px;font-size:14px;
}
.sesslist{margin-top:8px;font-size:13px;color:var(--ink2);font-variant-numeric:tabular-nums}
.sesslist div{padding:3px 0;border-top:1px solid var(--line)}
.sesslist b{color:var(--ink)}
.datarow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
textarea.imp{
  width:100%;margin-top:10px;border:1px solid var(--line);border-radius:10px;
  background:transparent;padding:9px;font-size:12px;min-height:90px;color:var(--ink);
}
.empty{font-size:13.5px;color:var(--mut);padding:12px 0;text-align:center}

/* ============ informe semanal (solo se ve al imprimir) ============ */
#report{display:none}
@media print{
  body{background:#fff}
  .app{display:none!important}
  #report{display:block}
}
.rp{font:11.5px/1.45 -apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:#151915;max-width:720px;margin:0 auto}
.rp h1{font-size:19px;margin:0 0 2px}
.rp .sub{color:#5a645a;font-size:11px;margin:0 0 8px}
.rp h2{font-size:13px;margin:14px 0 5px;padding-bottom:2px;border-bottom:2px solid #2E7D46;text-transform:uppercase;letter-spacing:.06em}
.rp h2.b{border-color:#2C4468}
.rp h3{font-size:11.5px;margin:9px 0 3px}
.rp table{width:100%;border-collapse:collapse;margin:2px 0 8px;break-inside:avoid}
.rp th,.rp td{border:1px solid #d5dad2;padding:3px 6px;text-align:left;vertical-align:top;font-variant-numeric:tabular-nums}
.rp th{background:#eef2ec;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#44503f}
.rp .st-todo{color:#256B3B;font-weight:700}
.rp .st-parte{color:#8F5B06;font-weight:700}
.rp .st-no{color:#A33C2B;font-weight:700}
.rp .st-none{color:#98a094}
.rp .kbox{display:flex;gap:16px;flex-wrap:wrap;border:1px solid #d5dad2;border-radius:6px;padding:7px 12px;margin:8px 0}
.rp .kbox span{font-size:10px;color:#5a645a;text-transform:uppercase;letter-spacing:.04em}
.rp .kbox b{display:block;font-size:14px;color:#151915}
.rp .obs{border:1px solid #d5dad2;border-radius:6px;height:95px;margin-top:4px;break-inside:avoid}
.rp .foot{margin-top:12px;color:#98a094;font-size:9.5px}
.rp .mut{color:#5a645a}

/* ============ tabs ============ */
nav.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  background:var(--card);border-top:1px solid var(--line);
  padding:6px 8px calc(6px + env(safe-area-inset-bottom));
  display:flex;justify-content:center;gap:6px;
}
nav.tabs button{
  flex:1;max-width:180px;border:none;background:none;border-radius:11px;
  padding:7px 4px 5px;color:var(--mut);font-size:11.5px;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
nav.tabs button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
nav.tabs button.on{color:var(--green-ink);background:var(--green-soft)}
nav.tabs button.on.gymtab{color:var(--navy-ink);background:var(--navy-soft)}

#toast{
  position:fixed;left:50%;bottom:calc(78px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(8px);
  background:var(--ink);color:var(--bg);border-radius:999px;padding:8px 18px;
  font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:40;
  max-width:88vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="app">
  <header class="top">
    <div class="brand"><b>DIETA</b> · <i>GYM</i><span class="savechip" id="saveChip">guardado ✓</span></div>
    <div class="daynav" id="daynav">
      <button class="arr" id="prevD" aria-label="Día anterior">‹</button>
      <div class="daylabel"><div class="dw" id="dowLbl"></div><div class="dt" id="dateLbl"></div></div>
      <button class="arr" id="nextD" aria-label="Día siguiente">›</button>
    </div>
    <button class="chip-today" id="todayBtn" hidden>Hoy</button>
  </header>

  <main id="main"></main>

  <nav class="tabs">
    <button data-tab="hoy" class="on" id="tab-hoy">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4"/><path d="M3 4v5M5 4v5M4 4v7"/></svg>
      Comidas
    </button>
    <button data-tab="gym" class="gymtab" id="tab-gym">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 12h8"/><rect x="4" y="8" width="3" height="8" rx="1"/><rect x="17" y="8" width="3" height="8" rx="1"/><path d="M2.5 10.5v3M21.5 10.5v3"/></svg>
      Gym
    </button>
    <button data-tab="prog" id="tab-prog">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19h16"/><path d="M5 15l4-4 3 2.5L19 7"/><path d="M15.5 7H19v3.5"/></svg>
      Progreso
    </button>
  </nav>

  <div id="toast" role="status"></div>
</div>

<section id="report" aria-hidden="true"></section>

<script>
"use strict";
/* prueba local: agregando #dark o #light a la URL se fuerza el tema */
if(location.hash==='#dark') document.documentElement.dataset.theme='dark';
if(location.hash==='#light') document.documentElement.dataset.theme='light';

/* ================= PLAN DE COMIDAS ================= */
const WK = {
  des:{t:'07:30',name:'Desayuno'}, mm:{t:'10:00',name:'Media mañana'},
  alm:{t:'12:00',name:'Almuerzo'}, col:{t:'15:00',name:'Colación',opt:true},
  mer:{t:'17:00',name:'Merienda'}, cena:{t:'22:00',name:'Cena'}
};
function meals(list){ return list.map(([id,desc])=>({id, t:WK[id].t, name:WK[id].name, opt:!!WK[id].opt, desc})); }

const FINDE = meals([
  ['des','Libre con cabeza: proteína en el plato.'],
  ['alm','Libre con cabeza: proteína en el plato, frituras al mínimo.'],
  ['mer','Libre con cabeza.'],
  ['cena','Libre con cabeza: proteína en el plato, frituras al mínimo.']
]);

const DIETA = {
  1: meals([
    ['des','Leche con cocoa (250 ml + cocoa 7 g + azúcar 5 g) + 2 fetas de pan lactal con queso untable light (20 g) y mermelada (15 g)'],
    ['mm','1 manzana'],
    ['alm','1 lata de atún al natural (120 g escurrido) + arroz (80 g en crudo) + 1 huevo duro. El arroz dejalo cocido el domingo de noche.'],
    ['col','2 galletas de arroz — solo si tenés hambre'],
    ['mer','Leche con cocoa (250 ml + cocoa 7 g + azúcar 5 g) + omelette de 1 huevo con orégano + 2 fetas de pan lactal'],
    ['cena','Milanesa de carne AL HORNO (180 g) + papa al horno (250 g). Hacé 2 milanesas y doble papa: mañana almorzás lo mismo.']
  ]),
  2: meals([
    ['des','Sándwich: 2 fetas de pan lactal + 2 fetas de jamón (40 g) + 1 feta de queso (20 g) + agua o leche con cocoa si te da el tiempo'],
    ['mm','1 manzana'],
    ['alm','Tupper: milanesa al horno + papa'],
    ['col','2 galletas de arroz — solo si tenés hambre'],
    ['mer','Leche con cocoa (250 ml + cocoa 7 g + azúcar 5 g) + 3 galletas de arroz con queso untable light (20 g)'],
    ['cena','Hamburguesas caseras: comé 2, guardá 2 + arroz (80 g en crudo). Cociná 160 g de arroz y guardá la mitad. Receta: 400 g de carne picada magra + 30 g de pan rallado + 1 huevo + orégano, sal y pimienta. Armá 4 hamburguesas iguales (~110 g c/u): 2 para la cena, 2 para el tupper del miércoles. A la plancha o al horno, sin aceite extra.']
  ]),

/* bloque de casillas por ejercicio (core / estiramientos) con contador */
function checklistBlock(fieldEx, title, intro, items, g, outro){
  const obj=(g&&g[fieldEx])||{};
  let n=0; items.forEach((_,i)=>{ if(obj[i]) n++; });
  let h='<div class="ckhead"><span class="ct">'+title+'</span>'
    +'<span class="cnt" id="cnt-'+fieldEx+'">'+n+' de '+items.length+'</span></div>';
  if(intro) h+='<div class="cd" style="margin:2px 0 2px">'+intro+'</div>';
  items.forEach((it,i)=>{
    h+='<label class="ckitem"><input type="checkbox" data-ckx="'+fieldEx+'" data-i="'+i+'" data-total="'+items.length+'"'+(obj[i]?' checked':'')+'>'
      +'<span><b>'+it[0]+'</b> — '+it[1]+(it[2]?': '+it[2]:'')+'</span></label>';
  });
  if(outro) h+='<div class="cd" style="margin-top:6px">'+outro+'</div>';
  return h;
}
/* datos viejos: si el bloque entero estaba marcado con el checkbox anterior, pasar a todas las casillas */
function normChecks(g){
  if(!g) return;
  const map={core:['coreEx',2],str:['strEx',STRETCH_ITEMS.length],strHome:['strHomeEx',STRETCH_ITEMS.length]};
  for(const leg in map){
    const f=map[leg][0], total=map[leg][1];
    if(g[leg]===true&&!g[f]){ g[f]={}; for(let i=0;i<total;i++) g[f][i]=true; }
  }
}
function ckCount(g,f,leg,total){
  if(g[f]){ let n=0; for(let i=0;i<total;i++){ if(g[f][i]) n++; } return n; }
  return g[leg]?total:0;
}
function anyCk(o){ if(!o) return false; for(const k in o){ if(o[k]) return true; } return false; }

function fmtD(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function pD(s){ const p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }

function sessionHasData(g){
  if(!g) return false;

  if(g.sets) for(const k in g.sets){ if((g.sets[k]||[]).some(s=>s&&(s.w||s.r))) return true; }

function prevSession(dia){

function fmtSets(arr,n){
  const out=[];
  for(let i=0;i<n;i++){ const s=(arr||[])[i];
    if(s&&(s.w||s.r)) out.push((s.w!=null&&s.w!==''?kg(+s.w):'–')+'×'+(s.r||'–')); }
  return out.join('  ');
}
function allTop(ex,arr){
  for(let i=0;i<ex.sets;i++){ const s=(arr||[])[i]; if(!s||!(+s.r>=ex.rmax)) return false; }
  return true;
}

let wkSelVal=null;
function mondayOf(ds){ const d=pD(ds); d.setDate(d.getDate()-((d.getDay()+6)%7)); return fmtD(d); }
function weekDays(mon){ const out=[],d0=pD(mon); for(let i=0;i<7;i++){ const d=new Date(d0); d.setDate(d0.getDate()+i); out.push(fmtD(d)); } return out; }
function weekLabel(mon){ const a=pD(mon),b=new Date(a); b.setDate(a.getDate()+6);
  return 'lun '+a.getDate()+'/'+(a.getMonth()+1)+' – dom '+b.getDate()+'/'+(b.getMonth()+1); }
function weeksWithData(){
  const s=new Set();
  Object.keys(state.meals).forEach(d=>s.add(mondayOf(d)));
  Object.keys(state.gym).forEach(d=>s.add(mondayOf(d)));
  state.peso.forEach(p=>s.add(mondayOf(p.d)));
  s.add(mondayOf(todayStr()));
  return [...s].sort().reverse().slice(0,12);
}
function defaultWeek(){
  /* lunes o martes: por defecto la semana que acaba de terminar */
  const dw=pD(todayStr()).getDay();
  const mon=pD(mondayOf(todayStr()));
  if(dw===1||dw===2) mon.setDate(mon.getDate()-7);
  return fmtD(mon);
}
function weekStats(days){

    for(const k in r){ if(k==='extras') continue;
      const s=r[k]&&r[k].s;
      if(s==='todo')cT++; else if(s==='parte')cP++; else if(s==='no')cN++; }
    if(sessionHasData(state.gym[d])) gs++;
  });
  return {cT:cT,cP:cP,cN:cN,gs:gs};
}
const ST_RP={todo:['✓ Todo','st-todo'],parte:['◐ Parte','st-parte'],no:['✕ No','st-no']};

function fillReport(mon){
  const days=weekDays(mon);
  const st=weekStats(days);
  const sorted=[...state.peso].sort((a,b)=>a.d<b.d?-1:1);
  const inWeek=sorted.filter(p=>p.d>=days[0]&&p.d<=days[6]);
  const before=sorted.filter(p=>p.d<days[0]);
  const prevW=before.length?before[before.length-1]:null;
  const gen=pD(todayStr());

  let h='<div class="rp">'
    +'<h1>Informe semanal — Agustín</h1>'
    +'<p class="sub">Semana del '+weekLabel(mon)+' de '+pD(mon).getFullYear()
    +' · generado el '+gen.getDate()+'/'+(gen.getMonth()+1)+'/'+gen.getFullYear()
    +' · Plan: ~2.000-2.100 kcal/día · objetivo 70-75 kg · gym L-M-V 19:30</p>';

  /* resumen */
  let pesoTxt='—';
  if(inWeek.length){
    const lp=inWeek[inWeek.length-1];
    pesoTxt=kg(lp.kg)+' kg';
    if(prevW) pesoTxt+=' ('+(lp.kg-prevW.kg>0?'+':'')+kg(lp.kg-prevW.kg)+' vs anterior)';
  } else if(prevW){ pesoTxt='sin registro (último: '+kg(prevW.kg)+' kg)'; }
  h+='<div class="kbox">'
    +'<div><span>Comidas todo</span><b>'+st.cT+'</b></div>'
    +'<div><span>Parte</span><b>'+st.cP+'</b></div>'
    +'<div><span>Salteadas</span><b>'+st.cN+'</b></div>'
    +'<div><span>Gym</span><b>'+st.gs+' de 3</b></div>'
    +'<div><span>Peso</span><b>'+pesoTxt+'</b></div>'
    +'</div>';

  /* peso */
  h+='<h2>Peso corporal</h2>';
  if(inWeek.length||prevW){
    h+='<table><tr><th>Fecha</th><th>Peso</th><th>Cambio</th></tr>';
    if(prevW) h+='<tr><td class="mut">'+shortD(prevW.d)+' (anterior)</td><td class="mut">'+kg(prevW.kg)+' kg</td><td class="mut">—</td></tr>';
    let ref=prevW;
    inWeek.forEach(p=>{
      h+='<tr><td>'+shortD(p.d)+'</td><td><b>'+kg(p.kg)+' kg</b></td><td>'
        +(ref?((p.kg-ref.kg>0?'+':'')+kg(p.kg-ref.kg)+' kg'):'—')+'</td></tr>';
      ref=p;
    });
    h+='</table>';
  } else h+='<p class="mut">Sin registros de peso.</p>';

  /* comidas */
  h+='<h2>Comidas (plan vs. real)</h2>';
  days.forEach(d=>{
    const dow=pD(d).getDay();
    const plan=DIETA[dow];
    const rec=state.meals[d]||{};
    const any=plan.some(m=>rec[m.id]&&(rec[m.id].s||rec[m.id].n))||rec.extras;
    h+='<h3>'+DOWF[dow]+' '+pD(d).getDate()+'/'+(pD(d).getMonth()+1)+((dow===0||dow===6)?' <span class="mut">(libre con cabeza)</span>':'')+'</h3>';
    if(!any){ h+='<p class="mut">Sin registros.</p>'; return; }
    h+='<table><tr><th style="width:52px">Hora</th><th style="width:110px">Comida</th><th style="width:70px">Estado</th><th>Nota</th></tr>';
    plan.forEach(m=>{
      const r=rec[m.id]||{};
      const s=r.s?ST_RP[r.s]:['— sin registro','st-none'];
      h+='<tr><td>'+m.t+'</td><td>'+m.name+(m.opt?' <span class="mut">(opc.)</span>':'')+'</td>'
        +'<td class="'+s[1]+'">'+s[0]+'</td><td>'+esc(r.n||'')+'</td></tr>';
    });
    if(rec.extras) h+='<tr><td colspan="2" class="mut">Extras del día</td><td colspan="2">'+esc(rec.extras)+'</td></tr>';
    h+='</table>';
  });

  /* gym */
  h+='<h2 class="b">Gym (kg × reps por serie)</h2>';
  let anyGym=false;
  days.forEach(d=>{
    const g=state.gym[d];
    if(!g) return;
    const nsh=ckCount(g,'strHomeEx','strHome',STRETCH_ITEMS.length);
    if(nsh>0){ anyGym=true; h+='<h3>'+DOWF[pD(d).getDay()]+' '+pD(d).getDate()+'/'+(pD(d).getMonth()+1)+'</h3><p>Estiramientos en casa (15-20 min): '+nsh+' de '+STRETCH_ITEMS.length+'</p>'; }
    if(!g.dia||!sessionHasData(g)) return;
    anyGym=true;
    const plan=GYM[g.dia];
    h+='<h3>'+DOWF[pD(d).getDay()]+' '+pD(d).getDate()+'/'+(pD(d).getMonth()+1)+' — '+plan.label+' · '+plan.desc+'</h3>';
    h+='<table><tr><th>Ejercicio</th><th style="width:95px">Objetivo</th><th style="width:170px">Series hechas</th><th style="width:85px">Progresión</th></tr>';
    plan.ex.forEach(ex=>{
      const arr=(g.sets&&g.sets[ex.id])||[];
      const done=fmtSets(arr,ex.sets);
      h+='<tr><td>'+ex.name+'</td>'
        +'<td>'+ex.sets+' × '+(ex.rmin===ex.rmax?ex.rmin:ex.rmin+'-'+ex.rmax)+' · '+ex.rest+'</td>'
        +'<td>'+(done?'<b>'+done+'</b>':'<span class="st-none">—</span>')+'</td>'
        +'<td>'+(done&&allTop(ex,arr)?'<span class="st-todo">Subir peso</span>':'')+'</td></tr>';
    });
    h+='</table>'
      +'<p class="mut">Core: '+ckCount(g,'coreEx','core',2)+' de 2 · Estiramientos y movilidad: '
      +ckCount(g,'strEx','str',STRETCH_ITEMS.length)+' de '+STRETCH_ITEMS.length+'</p>';
  });
  if(!anyGym) h+='<p class="mut">Sin sesiones registradas.</p>';

  /* observaciones */
  h+='<h2>Observaciones del entrenador / nutricionista</h2><div class="obs"></div>'
    +'<p class="foot">Registrado día a día por Agustín en su app de seguimiento. ✓ Todo = comió lo del plan · ◐ Parte = comió menos o cambió algo (ver nota) · ✕ No = salteada · — = no registrado.</p>'
    +'</div>';
  document.getElementById('report').innerHTML=h;
}

function reportText(mon){
  const days=weekDays(mon);
  const st=weekStats(days);
  const M={todo:'✓',parte:'~',no:'✗'};
  let t='INFORME SEMANAL — AGUSTÍN\nSemana del '+weekLabel(mon)+'\n';
  t+='Resumen: comidas '+st.cT+'✓ '+st.cP+'~ '+st.cN+'✗ · gym '+st.gs+' de 3\n';
  const inWeek=[...state.peso].sort((a,b)=>a.d<b.d?-1:1).filter(p=>p.d>=days[0]&&p.d<=days[6]);
  if(inWeek.length) t+='Peso: '+inWeek.map(p=>shortD(p.d)+' '+kg(p.kg)+' kg').join(' · ')+'\n';
  t+='\nCOMIDAS (✓ todo · ~ parte · ✗ no)\n';
  days.forEach(d=>{
    const dow=pD(d).getDay(), plan=DIETA[dow], rec=state.meals[d]||{};
    const parts=plan.map(m=>{
      const r=rec[m.id]||{};
      if(!r.s&&!r.n) return null;
      return m.name+' '+(r.s?M[r.s]:'')+(r.n?' ('+r.n+')':'');
    }).filter(Boolean);
    if(!parts.length&&!rec.extras) return;
    t+=DOWS[dow]+' '+pD(d).getDate()+'/'+(pD(d).getMonth()+1)+': '+parts.join(' · ');
    if(rec.extras) t+=' | Extras: '+rec.extras;
    t+='\n';
  });
  t+='\nGYM\n';
  days.forEach(d=>{
    const g=state.gym[d];
    if(!g||!g.dia||!sessionHasData(g)) return;
    const plan=GYM[g.dia];
    t+=DOWS[pD(d).getDay()]+' '+pD(d).getDate()+'/'+(pD(d).getMonth()+1)+' — '+plan.label+' ('+plan.desc+')\n';
    plan.ex.forEach(ex=>{
      const arr=(g.sets&&g.sets[ex.id])||[];
      const done=fmtSets(arr,ex.sets);
      if(done) t+='- '+ex.name+': '+done+(allTop(ex,arr)?' → subir peso':'')+'\n';
    });
    t+='Core '+ckCount(g,'coreEx','core',2)+'/2 · Estiramientos '+ckCount(g,'strEx','str',STRETCH_ITEMS.length)+'/'+STRETCH_ITEMS.length+'\n';
  });
  return t;
}

/* ================= PROGRESO ================= */
function weekDates(){
  const t=pD(todayStr()); const off=(t.getDay()+6)%7;
  const mon=new Date(t); mon.setDate(t.getDate()-off);
  const out=[];
  for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i); out.push(fmtD(d)); }
  return out;
}

function weightChart(){
  const data=[...state.peso].sort((a,b)=>a.d<b.d?-1:1);
  if(data.length===0) return '<div class="empty">Todavía no registraste ningún peso.</div>';
  if(data.length===1) return '<div class="empty">Primer registro: <b>'+kg(data[0].kg)+' kg</b> ('+shortD(data[0].d)+'). Con el segundo aparece la curva.</div>';
  const W=340,H=170,pl=34,pr=44,pt=12,pb=22;
  const iw=W-pl-pr, ih=H-pt-pb;
  const t0=pD(data[0].d).getTime(), t1=pD(data[data.length-1].d).getTime();
  const vs=data.map(p=>p.kg);
  const lo=Math.min(69.5,Math.min.apply(null,vs)-0.5);
  const hi=Math.max(78.5,Math.max.apply(null,vs)+0.5);
  const X=t=>pl+(t1===t0?iw/2:(t-t0)/(t1-t0)*iw);
  const Y=v=>pt+ih-(v-lo)/(hi-lo)*ih;
  let s='<svg viewBox="0 0 '+W+' '+H+'" role="img" aria-label="Evolución del peso corporal en kilos">';
  /* franja objetivo 70-75 */
  s+='<rect x="'+pl+'" y="'+Y(75)+'" width="'+iw+'" height="'+(Y(70)-Y(75))+'" fill="var(--green-soft)" opacity="0.55"/>';
  s+='<text x="'+(pl+4)+'" y="'+(Y(75)+11)+'" font-size="9" fill="var(--green-ink)">objetivo 70-75</text>';
  /* grilla */
  for(let v=Math.ceil(lo);v<=Math.floor(hi);v++){
    if(v%2!==0) continue;
    s+='<line x1="'+pl+'" y1="'+Y(v)+'" x2="'+(pl+iw)+'" y2="'+Y(v)+'" stroke="var(--line)" stroke-width="1"/>'
      +'<text x="'+(pl-5)+'" y="'+(Y(v)+3)+'" font-size="9" fill="var(--mut)" text-anchor="end">'+v+'</text>';
  }
  /* línea */
  let path='';
  data.forEach((p,i)=>{ path+=(i?'L':'M')+X(pD(p.d).getTime()).toFixed(1)+' '+Y(p.kg).toFixed(1)+' '; });
  s+='<path d="'+path+'" fill="none" stroke="var(--chart-green)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
  data.forEach((p,i)=>{
    const x=X(pD(p.d).getTime()),y=Y(p.kg);
    s+='<circle cx="'+x+'" cy="'+y+'" r="'+(i===data.length-1?4:3)+'" fill="var(--chart-green)" stroke="var(--card)" stroke-width="2"/>'
      +'<circle cx="'+x+'" cy="'+y+'" r="13" fill="transparent" data-wp="'+i+'" style="cursor:pointer"/>';
  });
  const lp=data[data.length-1];
  s+='<text x="'+(X(pD(lp.d).getTime())+7)+'" y="'+(Y(lp.kg)+4)+'" font-size="11" font-weight="700" fill="var(--ink)">'+kg(lp.kg)+'</text>';
  /* fechas extremos */
  s+='<text x="'+pl+'" y="'+(H-6)+'" font-size="9" fill="var(--mut)">'+shortD(data[0].d)+'</text>'
    +'<text x="'+(pl+iw)+'" y="'+(H-6)+'" font-size="9" fill="var(--mut)" text-anchor="end">'+shortD(lp.d)+'</text>';
  return s+'</svg>';
}

function exChart(exId){
  const dia=exId[0]==='a'?'A':exId[0]==='b'?'B':'C';
  const ex=GYM[dia].ex.find(x=>x.id===exId);
  const sess=Object.keys(state.gym).sort()
    .filter(d=>state.gym[d].dia===dia&&state.gym[d].sets&&(state.gym[d].sets[exId]||[]).some(s=>s&&s.w))
    .map(d=>{
      const arr=state.gym[d].sets[exId];
      return {d:d,w:Math.max.apply(null,arr.filter(s=>s&&s.w).map(s=>+s.w)),txt:fmtSets(arr,ex.sets)};
    });
  if(sess.length===0) return {svg:'<div class="empty">Todavía no cargaste series de este ejercicio.</div>',list:''};
  const last=sess.slice(-4).reverse();
  const list='<div class="sesslist">'+last.map(s=>'<div>'+shortD(s.d)+' — <b>'+s.txt+'</b></div>').join('')+'</div>';
  if(sess.length===1) return {svg:'<div class="empty">Una sesión registrada: <b>'+kg(sess[0].w)+' kg</b>. Con la segunda aparece la curva.</div>',list:list};
  const pts=sess.slice(-10);
  const W=340,H=120,pl=30,pr=44,pt=10,pb=18;
  const iw=W-pl-pr, ih=H-pt-pb;
  const vs=pts.map(p=>p.w);
  const lo=Math.min.apply(null,vs)-1, hi=Math.max.apply(null,vs)+1;
  const X=i=>pl+(pts.length===1?iw/2:i/(pts.length-1)*iw);
  const Y=v=>pt+ih-(v-lo)/(hi-lo)*ih;
  let s='<svg viewBox="0 0 '+W+' '+H+'" role="img" aria-label="Peso máximo por sesión">';
  s+='<line x1="'+pl+'" y1="'+(pt+ih)+'" x2="'+(pl+iw)+'" y2="'+(pt+ih)+'" stroke="var(--line)" stroke-width="1"/>';
  let path='';
  pts.forEach((p,i)=>{ path+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(p.w).toFixed(1)+' '; });
  s+='<path d="'+path+'" fill="none" stroke="var(--chart-blue)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
  pts.forEach((p,i)=>{
    s+='<circle cx="'+X(i)+'" cy="'+Y(p.w)+'" r="'+(i===pts.length-1?4:3)+'" fill="var(--chart-blue)" stroke="var(--card)" stroke-width="2"/>';
  });
  const lp=pts[pts.length-1];
  s+='<text x="'+(X(pts.length-1)+7)+'" y="'+(Y(lp.w)+4)+'" font-size="11" font-weight="700" fill="var(--ink)">'+kg(lp.w)+'</text>';
  s+='<text x="'+pl+'" y="'+(H-4)+'" font-size="9" fill="var(--mut)">'+shortD(pts[0].d)+'</text>'
    +'<text x="'+(pl+iw)+'" y="'+(H-4)+'" font-size="9" fill="var(--mut)" text-anchor="end">'+shortD(lp.d)+'</text>';
  return {svg:s+'</svg>',list:list};
}

function renderProg(){
  const data=[...state.peso].sort((a,b)=>a.d<b.d?-1:1);
  let kpis='';
  if(data.length){
    const first=data[0],last=data[data.length-1];
    const diff=last.kg-first.kg;
    kpis='<div class="kpis">'
      +'<div class="kpi">Inicio<b>'+kg(first.kg)+' kg</b></div>'
      +'<div class="kpi">Último<b>'+kg(last.kg)+' kg</b></div>'
      +(data.length>1?'<div class="kpi'+(diff<0?' good':'')+'">Cambio<b>'+(diff>0?'+':'')+kg(diff)+' kg</b></div>':'')
      +'<div class="kpi">Objetivo<b>70-75 kg</b></div>'
      +'</div>';
  }
  const wlist=data.slice(-6).reverse().map(p=>{
    const i=state.peso.findIndex(q=>q.d===p.d);
    return '<div class="wli"><span>'+shortD(p.d)+' — <b>'+kg(p.kg)+' kg</b></span><button data-delw="'+i+'" aria-label="Borrar registro">✕</button></div>';
  }).join('');

  let h='<div class="card"><div class="eyebrow g">Peso corporal</div>'+kpis
    +'<div class="chartbox">'+weightChart()+'</div><div class="cdetail" id="wdetail"></div>'
    +'<div class="wform"><input type="number" inputmode="decimal" step="0.1" min="40" max="150" id="pesoIn" placeholder="kg de hoy (ej: 77.2)"><button class="btn" id="pesoBtn">Guardar</button></div>'
    +'<p class="hint">Pesate 1 sola vez por semana: <b>viernes en ayunas</b>, después del baño.</p>'
    +(wlist?'<div class="wlist">'+wlist+'</div>':'')
    +'</div>';

  /* semana */
  const wd=weekDates();
  let cT=0,cP=0,cN=0,gs=0;
  wd.forEach(d=>{
    const r=state.meals[d]||{};
    for(const k in r){ if(r[k]&&r[k].s==='todo')cT++; else if(r[k]&&r[k].s==='parte')cP++; else if(r[k]&&r[k].s==='no')cN++; }
    if(sessionHasData(state.gym[d])) gs++;
  });
  h+='<div class="card"><div class="eyebrow">Esta semana</div>'
    +'<div class="kpis">'
    +'<div class="kpi good">Comidas todo<b>'+cT+'</b></div>'
    +'<div class="kpi">Parte<b>'+cP+'</b></div>'
    +'<div class="kpi">Salteadas<b>'+cN+'</b></div>'
    +'<div class="kpi'+(gs>=3?' good':'')+'">Gym<b>'+gs+' de 3</b></div>'
    +'</div></div>';

  /* progresión ejercicio */
  let opts='';
  ['A','B','C'].forEach(k=>{
    opts+='<optgroup label="'+GYM[k].label+' · '+GYM[k].desc+'">'
      +GYM[k].ex.map(e=>'<option value="'+e.id+'"'+(exSelVal===e.id?' selected':'')+'>'+e.name+'</option>').join('')
      +'</optgroup>';
  });
  const ec=exChart(exSelVal);
  h+='<div class="card"><div class="eyebrow b">Progresión por ejercicio</div>'
    +'<select class="exsel" id="exSel" aria-label="Elegir ejercicio">'+opts+'</select>'
    +'<div class="chartbox">'+ec.svg+'</div>'+ec.list+'</div>';

  /* informe semanal */
  const wk=wkSelVal||defaultWeek();
  const wopts=weeksWithData().map(m=>'<option value="'+m+'"'+(m===wk?' selected':'')+'>Semana del '+weekLabel(m)+'</option>').join('');
  h+='<div class="card"><div class="eyebrow g">Informe semanal</div>'
    +'<p class="hint">Armá un PDF con todo el detalle de la semana (comidas, series del gym y peso) para llevarle al que te armó la rutina y la dieta.</p>'
    +'<select class="exsel" id="wkSel" aria-label="Elegir semana">'+wopts+'</select>'
    +'<div class="datarow">'
    +'<button class="btn" id="btnPdf">Generar PDF</button>'
    +'<button class="btn plain" id="btnTxt">Copiar como texto</button>'
    +'</div>'
    +'<p class="hint">«Generar PDF» abre la pantalla de imprimir: elegí <b>Guardar como PDF</b> y compartilo por WhatsApp. «Copiar como texto» te lo deja listo para pegar en un mensaje.</p>'
    +'</div>';

  /* datos */
  const df=new Date(state._first||Date.now());
  const nDias=Object.keys(state.meals).length, nGym=Object.keys(state.gym).length, nPeso=state.peso.length;
  h+='<div class="card"><div class="eyebrow">Tus datos</div>'
    +'<p class="hint">Guardando en este navegador desde el <b>'+df.getDate()+'/'+(df.getMonth()+1)+'/'+df.getFullYear()+'</b> · '
    +nDias+' días de comidas · '+nGym+' días de gym · '+nPeso+' pesos. <b>Si esa fecha se reinicia sola, este navegador borra los datos al salir: avisame.</b></p>'
    +'<p class="hint">Abrí la app <b>siempre desde el mismo navegador</b> (Opera, agregada a la pantalla de inicio). Si la abrís desde adentro de WhatsApp o de otra app, ese visor puede borrar todo al cerrarse.</p>'
    +'<p class="hint">Todo se guarda <b>en este teléfono</b> (no en internet). Hacete un respaldo cada tanto por si cambiás de celular o borrás datos del navegador.</p>'
    +'<div class="datarow">'
    +'<button class="btn b" id="btnCopy">Copiar respaldo</button>'
    +'<button class="btn b" id="btnDl">Descargar respaldo</button>'
    +'<button class="btn plain" id="btnImp">Restaurar…</button>'
    +'<button class="btn danger" id="btnWipe">Borrar todo</button>'
    +'</div>'
    +'<div id="impBox" hidden><textarea class="imp" id="impTxt" placeholder="Pegá acá el respaldo copiado…"></textarea>'
    +'<div class="datarow"><button class="btn" id="btnImpDo">Restaurar estos datos</button></div></div>'
    +'<p class="hint">Tip: en el menú del navegador tocá <b>«Agregar a pantalla de inicio»</b> y te queda como una app más.</p>'
    +'</div>';

  return h;
}

}
function flashSaved(){
  const c=document.getElementById('saveChip');
  if(!c) return;
  c.classList.add('show');
  clearTimeout(flashSaved._h); flashSaved._h=setTimeout(()=>c.classList.remove('show'),1600);
}

main.addEventListener('click',e=>{
  const st=e.target.closest('[data-status]');
  if(st){
    const id=st.dataset.meal, v=st.dataset.status;
    if(!state.meals[selDate]) state.meals[selDate]={};
    const cur=state.meals[selDate][id]||{};
    cur.s=(cur.s===v)?null:v;
    state.meals[selDate][id]=cur; save();
    /* marcar el botón en el lugar, sin redibujar: así el scroll no se mueve */
    st.closest('.seg').querySelectorAll('.sbtn').forEach(b=>{
      b.classList.toggle('on', !!cur.s && b.dataset.status===cur.s);
    });
    updateHoySummary();
    return;
  }
  const db=e.target.closest('[data-dia]');
  if(db){ ensureGym(db.dataset.dia); save(); render(); return; }
  const wp=e.target.closest('[data-wp]');
  if(wp){
    const data=[...state.peso].sort((a,b)=>a.d<b.d?-1:1);
    const p=data[+wp.dataset.wp];
    if(p) document.getElementById('wdetail').textContent=shortD(p.d)+' — '+kg(p.kg)+' kg';
    return;
  }
  const dw=e.target.closest('[data-delw]');
  if(dw){
    if(confirm('¿Borrar este registro de peso?')){ state.peso.splice(+dw.dataset.delw,1); save(); render(); }
    return;
  }
  if(e.target.id==='pesoBtn'){
    const inp=document.getElementById('pesoIn');
    const v=parseFloat(inp.value);
    if(!(v>=40&&v<=150)){ toast('Ingresá un peso válido en kg'); return; }
    const t=todayStr();
    const ix=state.peso.findIndex(p=>p.d===t);
    if(ix>=0) state.peso[ix].kg=v; else state.peso.push({d:t,kg:v});
    save(); render(); toast('Peso guardado: '+kg(v)+' kg'); return;
  }
  if(e.target.id==='btnSaveNow'){
    save();
    toast('Guardado ✓ — la app también guarda sola con cada cambio');
    return;
  }
  if(e.target.id==='btnPdf'){
    fillReport(wkSelVal||defaultWeek());
    window.print();
    return;
  }
  if(e.target.id==='btnTxt'){
    const txt=reportText(wkSelVal||defaultWeek());
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(()=>toast('Informe copiado: pegalo en WhatsApp'),()=>toast('No se pudo copiar'));
    } else toast('Tu navegador no deja copiar; usá el PDF');
    return;
  }
  if(e.target.id==='btnCopy'){
    const j=JSON.stringify(state);
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(j).then(()=>toast('Respaldo copiado al portapapeles'),()=>toast('No se pudo copiar'));
    } else toast('Usá «Descargar respaldo»');
    return;
  }
  if(e.target.id==='btnDl'){
    const blob=new Blob([JSON.stringify(state,null,1)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='gymdieta-respaldo-'+todayStr()+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    toast('Respaldo descargado'); return;
  }
  if(e.target.id==='btnImp'){
    const box=document.getElementById('impBox'); box.hidden=!box.hidden; return;
  }
  if(e.target.id==='btnImpDo'){
    try{
      const p=JSON.parse(document.getElementById('impTxt').value);
      if(!p||typeof p!=='object'||(!p.meals&&!p.gym&&!p.peso)) throw 0;
      if(confirm('Esto reemplaza TODOS los datos actuales por los del respaldo. ¿Seguir?')){
        state={meals:p.meals||{},gym:p.gym||{},peso:p.peso||[]}; save(); render(); toast('Datos restaurados');
      }
    }catch(_){ toast('Ese texto no es un respaldo válido'); }
    return;
  }
  if(e.target.id==='btnWipe'){
    if(confirm('¿Borrar TODOS los registros? Esto no se puede deshacer.')&&confirm('¿Seguro seguro? Última chance.')){
      state={meals:{},gym:{},peso:[]}; save(); render(); toast('Todo borrado');
    }
    return;
  }
});

main.addEventListener('input',e=>{
  const t=e.target;
  if(t.dataset.note!==undefined){
    if(!state.meals[selDate]) state.meals[selDate]={};
    const cur=state.meals[selDate][t.dataset.note]||{};
    cur.n=t.value; state.meals[selDate][t.dataset.note]=cur; save();
    /* actualizar sin re-render para no perder el foco */
    return;
  }
  if(t.dataset.extras!==undefined){
    if(!state.meals[selDate]) state.meals[selDate]={};
    state.meals[selDate].extras=t.value; save(); return;
  }
  if(t.dataset.set!==undefined){
    const g=ensureGym(curDia);
    const id=t.dataset.ex, i=+t.dataset.i, f=t.dataset.f;
    if(!g.sets[id]) g.sets[id]=[];
    if(!g.sets[id][i]) g.sets[id][i]={};
    const num=parseFloat(t.value);
    const v=(t.value===''||isNaN(num))?null:num;
    if(v==null) delete g.sets[id][i][f]; else g.sets[id][i][f]=v;
    save();
    const dia=g.dia||curDia;
    const ex=GYM[dia].ex.find(x=>x.id===id);
    if(f==='r') t.classList.toggle('hit',v!=null&&v>=ex.rmax);
    const badge=document.getElementById('top-'+id);
    if(badge) badge.classList.toggle('show',allTop(ex,g.sets[id]));
    return;
  }
});

main.addEventListener('change',e=>{
  const t=e.target;
  if(t.dataset.ckx!==undefined){
    const g=ensureGym(curDia);
    const f=t.dataset.ckx, total=+t.dataset.total;
    if(!g[f]) g[f]={};
    g[f][+t.dataset.i]=t.checked;
    let n=0; for(let i=0;i<total;i++){ if(g[f][i]) n++; }
    const leg={coreEx:'core',strEx:'str',strHomeEx:'strHome'}[f];
    if(leg) g[leg]=(n===total);
    const c=document.getElementById('cnt-'+f);
    if(c) c.textContent=n+' de '+total;
    save(); return;
  }
  if(t.dataset.check!==undefined){
    const g=ensureGym(curDia);
    g[t.dataset.check]=t.checked; save(); return;
  }
  if(t.id==='exSel'){ exSelVal=t.value; render(); return; }
  if(t.id==='wkSel'){ wkSelVal=t.value; return; }
});

/* si imprime con Ctrl+P sin pasar por el botón, que el informe igual exista */
window.addEventListener('beforeprint',()=>{
  if(!document.getElementById('report').innerHTML) fillReport(wkSelVal||defaultWeek());
});

render();
</script>

</body>
</html>
